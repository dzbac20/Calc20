<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المعدل</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f0f0f; color: #fff; font-family: sans-serif; padding: 20px; }
        .app-card { background: #1a1a1a; border-radius: 20px; padding: 20px; border: 1px solid #0056b3; max-width: 500px; margin: auto; }
        .score-input { background: #333; color: white; border: 1px solid #555; border-radius: 8px; width: 80px; text-align: center; }
        .score-input:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-blue { background-color: #0056b3; color: white; border-radius: 12px; font-weight: bold; width: 100%; padding: 12px; border: none; }
        .subject-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; }
        #result-text { margin-top: 20px; text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <h3 class="text-center mb-4" style="color: #007bff;">🧮 حاسبة المعدل</h3>
    
    <select id="sectionSelect" class="form-select mb-4" style="background:#262626; color:white; border:none;" onchange="loadSubjects()">
        <option value="">اختر الشعبة</option>
    </select>

    <div id="subjectsContainer"></div>

    <button class="btn-blue mt-3" onclick="calculate()">احسب المعدل</button>
    <div id="result-text"></div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfwunHnfVhfgK9AitK6BJBsiCEN3VmXyX8sxkNJLmP_0JiBEB0MuzolwVTesf997_OXQ/exec";
    let allData = [];

    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            allData = data.slice(1);
            let sections = [...new Set(allData.map(r => r[0]))];
            let sel = document.getElementById('sectionSelect');
            sections.forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
        });

    function loadSubjects() {
        let sec = document.getElementById('sectionSelect').value;
        let container = document.getElementById('subjectsContainer');
        container.innerHTML = '';
        allData.filter(r => r[0] == sec).forEach(r => {
            let name = r[1];
            let coeff = r[2];
            let isOptional = (name.includes("بدنية") || name.includes("أمازيغية"));
            
            container.innerHTML += `
                <div class="subject-row">
                    <label>
                        ${isOptional ? `<input type="checkbox" checked onchange="toggle(this)">` : ''} 
                        ${name} (م:${coeff})
                    </label>
                    <input type="number" class="score-input" data-coeff="${coeff}" min="0" max="20" placeholder="0-20">
                </div>`;
        });
    }

    function toggle(chk) {
        let input = chk.parentElement.parentElement.querySelector('input');
        input.disabled = !chk.checked;
        if (input.disabled) {
            input.value = '';
            input.style.border = "1px solid #555";
        }
    }

    function calculate() {
        let sum = 0, totalCoeff = 0, hasError = false;
        
        document.querySelectorAll('.subject-row').forEach(row => {
            let input = row.querySelector('.score-input');
            let checkbox = row.querySelector('input[type="checkbox"]');
            
            // يحسب فقط إذا كانت المادة ليست اختيارية، أو اختيارية ومفعلة
            if (!checkbox || checkbox.checked) {
                let val = parseFloat(input.value);
                if (input.value === '' || val < 0 || val > 20) {
                    input.style.border = "2px solid #dc3545";
                    hasError = true;
                } else {
                    input.style.border = "1px solid #555";
                    let coeff = parseFloat(input.dataset.coeff) || 0;
                    sum += (val * coeff);
                    totalCoeff += coeff;
                }
            }
        });

        let resDiv = document.getElementById('result-text');
        resDiv.style.display = "block";
        
        if (hasError) {
            resDiv.innerHTML = "⚠️ يرجى إدخال نقاط صحيحة (0-20)";
            resDiv.style.backgroundColor = "#5a2a2a";
        } else if (totalCoeff === 0) {
            resDiv.innerHTML = "يرجى اختيار المواد";
            resDiv.style.backgroundColor = "#444";
        } else {
            let avg = (sum / totalCoeff).toFixed(2);
            if (avg >= 10) {
                resDiv.innerHTML = "🎉 مبروك عليك! معدلك: " + avg;
                resDiv.style.backgroundColor = "#1e4620";
            } else {
                resDiv.innerHTML = "💡 حاول مجدداً، ستنجح! معدلك: " + avg;
                resDiv.style.backgroundColor = "#5a2a2a";
            }
        }
    }
</script>
</body>
</html>
